site_name: Frontend-diplo
site_description: Documentación técnica del frontend React + TypeScript + Vite
theme:
  name: material
nav:
  - Inicio: index.md
  - Archivo: archive/README.md
  - Arquitectura:
      - Overview: architecture/overview.md
      - Data flow: architecture/data-flow.md
  - Setup:
      - Desarrollo local: setup/local-development.md
      - Entorno: setup/environment.md
  - Frontend:
      - Rutas: frontend/routes.md
      - Componentes: frontend/components.md
      - Estado y contexto: frontend/state-and-context.md
      - API client: frontend/api-client.md
      - Build: frontend/build.md
  - Testing: TESTING.md
  - Deployment: deployment.md
  - Troubleshooting: troubleshooting.md
  - Contributing: contributing.md
  - Operación:
      - Quality gate: QUALITY_GATE.md
      - Mantenimiento de docs: DOCS_MAINTENANCE.md
      - Runbook local: frontend/runbooks/local-stack.md
      - Fallos de build: frontend/runbooks/build-failures.md
      - Release checklist: frontend/runbooks/release-checklist.md
  - Calidad y mantenimiento:
      - Documentación interna del código: code-documentation.md
      - Auditoría interna del código: internal-code-audit.md
  - ADRs:
      - Resumen: adr/README.md
      - ADR 0001: adr/0001-frontend-stack.md
      - ADR 0002: adr/0002-api-client-boundary.md
  - Integración: integration/frontend-backend.md
  - Referencia heredada:
      - Arquitectura anterior: ARCHITECTURE.md
      - Frontend anterior: FRONTEND.md
      - QA Assistant E2E: QA_ASSISTANT_E2E.md
markdown_extensions:
  - admonition
  - tables
  - fenced_code
  - pymdownx.superfences
